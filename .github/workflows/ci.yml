name: CI Pipeline

# This section defines WHEN this workflow runs
on:
  push:
    branches: [main]

jobs:
  build-and-test:
    # This is the virtual machine GitHub spins up to run your commands
    runs-on: ubuntu-latest

    steps:
      # Step 1: Get your code onto the runner
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Install Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Step 3: Install your project's dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt

      # Step 4: Run your training script as a basic "test"
      # (In a real project, you'd run actual test files here with pytest -
      # for now, successfully running training proves the pipeline isn't broken)
      - name: Run training pipeline
        run: python train_mlflow.py